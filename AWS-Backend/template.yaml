              Ref: QuestradeApi
            Path: /api/data/accounts/{accountNumber}
            Method: GET
        GetPositions:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: QuestradeApi
            Path: /api/data/positions
            Method: GET
        GetAccountPositions:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: QuestradeApi
            Path: /api/data/positions/account/{accountId}
            Method: GET
        GetActivities:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: QuestradeApi
            Path: /api/data/activities
            Method: GET
        GetAccountActivities:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: QuestradeApi
            Path: /api/data/activities/account/{accountId}
            Method: GET
        GetStats:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: QuestradeApi
            Path: /api/data/stats
            Method: GET
        DataReadHealth:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: QuestradeApi
            Path: /api/data/health
            Method: GET
        GetPersonAccounts:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: QuestradeApi
            Path: /api/accounts/{personName}
            Method: GET
        GetAccountSummary:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: QuestradeApi
            Path: /api/accounts/summary/{personName}
            Method: GET
        GetAccountDropdownOptions:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: QuestradeApi
            Path: /api/accounts/dropdown-options
            Method: GET
        GetAccountDetail:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: QuestradeApi
            Path: /api/accounts/detail/{accountId}
            Method: GET
        GetPersonPositions:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: QuestradeApi
            Path: /api/positions/person/{personName}
            Method: GET
        GetPersonActivities:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: QuestradeApi
            Path: /api/activities/person/{personName}
            Method: GET
        GetSyncStats:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: QuestradeApi
            Path: /api/stats/sync
            Method: GET
        GetDataStats:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: QuestradeApi
            Path: /api/stats/data
            Method: GET
        GetErrorStats:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: QuestradeApi
            Path: /api/stats/errors
            Method: GET
    Metadata:
      SamResourceId: DataReadServiceFunction
  PortfolioAnalyticsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName:
        Fn::Sub: questrade-portfolio-analytics-${Environment}
      CodeUri: lambda-functions/portfolio-analytics/
      Handler: src/handler.handler
      MemorySize: 2048
      Timeout: 30
      Environment:
        Variables:
          TWELVE_DATA_API_KEY:
            Ref: TwelveDataApiKey
      Policies:
      - DynamoDBReadPolicy:
          TableName:
            Ref: AccountsTable
      - DynamoDBReadPolicy:
          TableName:
            Ref: PositionsTable
      - DynamoDBReadPolicy:
          TableName:
            Ref: ActivitiesTable
      - DynamoDBReadPolicy:
