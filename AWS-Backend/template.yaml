              Ref: QuestradeApi
            Path: /api/portfolio/{personName}
            Method: GET
        GetPerformance:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: QuestradeApi
            Path: /api/performance/{personName}
            Method: GET
        GetAllocation:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: QuestradeApi
            Path: /api/allocation/{personName}
            Method: GET
        GetAnalytics:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: QuestradeApi
            Path: /api/analytics/{personName}
            Method: GET
        GetReports:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: QuestradeApi
            Path: /api/reports/{personName}
            Method: GET
        GetComparison:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: QuestradeApi
            Path: /api/comparison/{personName}
            Method: GET
        PortfolioHealth:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: QuestradeApi
            Path: /api/portfolio/health
            Method: GET
        GetExchangeRate:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: QuestradeApi
            Path: /api/portfolio/exchange-rate
            Method: GET
        GetPortfolioPositions:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: QuestradeApi
            Path: /api/portfolio/positions
            Method: GET
        GetPortfolioCashBalances:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: QuestradeApi
            Path: /api/portfolio/cash-balances
            Method: GET
        GetPortfolioAnalysis:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: QuestradeApi
            Path: /api/portfolio/analysis
            Method: GET
    Metadata:
      SamResourceId: PortfolioAnalyticsFunction
  MarketDataServiceFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName:
        Fn::Sub: questrade-market-data-service-${Environment}
      CodeUri: lambda-functions/market-data-service/
      Handler: src/handler.handler
      MemorySize: 512
      Timeout: 10
      Environment:
        Variables:
          SYMBOLS_TABLE:
            Ref: SymbolsTable
          SYMBOLS_MASTER_TABLE:
            Ref: SymbolsMasterTable
          POSITIONS_TABLE:
            Ref: PositionsTable
          PERSONS_TABLE:
            Ref: PersonsTable
