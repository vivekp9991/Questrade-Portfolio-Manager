AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Questrade Portfolio Manager - Serverless Backend
Globals:
  Function:
    Runtime: nodejs20.x
    Architectures:
    - arm64
    Timeout: 30
    MemorySize: 512
    Environment:
      Variables:
        NODE_ENV: production
        LOG_LEVEL: INFO
        USERS_TABLE:
          Ref: UsersTable
        PERSONS_TABLE:
          Ref: PersonsTable
        TOKENS_TABLE:
          Ref: TokensTable
        ACCOUNTS_TABLE:
          Ref: AccountsTable
        POSITIONS_TABLE:
          Ref: PositionsTable
        ACTIVITIES_TABLE:
          Ref: ActivitiesTable
        SYMBOLS_TABLE:
          Ref: SymbolsTable
        WATCHLISTS_TABLE:
          Ref: WatchlistsTable
        WATCHLIST_SYMBOLS_TABLE:
          Ref: WatchlistSymbolsTable
        SYNC_HISTORY_TABLE:
          Ref: SyncHistoryTable
        SYMBOL_DIVIDENDS_TABLE:
          Ref: SymbolDividendsTable
        YIELD_EXCLUSIONS_TABLE:
          Ref: YieldExclusionsTable
        SYMBOLS_MASTER_TABLE:
          Ref: SymbolsMasterTable
        SYMBOL_CATEGORIES_TABLE:
          Ref: SymbolCategoriesTable
        CACHE_TABLE:
          Ref: CacheTable
        JWT_SECRET:
          Ref: JWTSecret
        ENCRYPTION_KEY:
          Ref: EncryptionKey
        QUESTRADE_AUTH_URL: https://login.questrade.com
  Api:
    Cors:
      AllowMethods: '''GET,POST,PUT,DELETE,OPTIONS'''
      AllowHeaders: '''Content-Type,Authorization'''
      AllowOrigins:
      - '''http://questrade-portfolio-frontend.s3-website-us-east-1.amazonaws.com'''
      - '''*'''
Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
    - dev
    - staging
    - prod
    Description: Deployment environment
  JWTSecret:
    Type: String
    NoEcho: true
    Description: Secret key for JWT token signing
    Default: change-this-secret-in-production
  EncryptionKey:
    Type: String
    NoEcho: true
    Description: Encryption key for sensitive data (must be 32 characters)
    Default: change-this-encryption-key-prod
  TwelveDataApiKey:
    Type: String
    NoEcho: true
    Description: Twelve Data API key for exchange rates and market data
    Default: ''
Resources:
  QuestradeApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName:
        Ref: Environment
      CorsConfiguration:
        AllowMethods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
        AllowHeaders:
        - Content-Type
        - Authorization
        AllowOrigins:
        - '*'
  JWTAuthorizerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName:
        Fn::Sub: questrade-jwt-authorizer-${Environment}
      CodeUri: lambda-functions/jwt-authorizer/
      Handler: src/handler.handler
      MemorySize: 256
      Timeout: 5
      Policies:
      - DynamoDBReadPolicy:
          TableName:
            Ref: UsersTable
    Metadata:
      SamResourceId: JWTAuthorizerFunction
  AuthServiceFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName:
        Fn::Sub: questrade-auth-service-${Environment}
      CodeUri: lambda-functions/auth-service/
      Handler: src/handler.handler
      MemorySize: 512
      Timeout: 10
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: UsersTable
      - DynamoDBCrudPolicy:
          TableName:
            Ref: PersonsTable
      - DynamoDBCrudPolicy:
          TableName:
            Ref: TokensTable
      Events:
        Login:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: QuestradeApi
            Path: /api/login
            Method: POST
        LoginVerify:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: QuestradeApi
            Path: /api/login/verify
            Method: POST
        LoginRefresh:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: QuestradeApi
            Path: /api/login/refresh
            Method: POST
        GetPersons:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: QuestradeApi
            Path: /api/persons
            Method: GET
        GetPerson:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: QuestradeApi
            Path: /api/persons/{personName}
            Method: GET
        CreatePerson:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: QuestradeApi
            Path: /api/persons
            Method: POST
        UpdatePerson:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: QuestradeApi
            Path: /api/persons/{personName}
            Method: PUT
        DeletePerson:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: QuestradeApi
            Path: /api/persons/{personName}
            Method: DELETE
        CreatePersonToken:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: QuestradeApi
            Path: /api/persons/{personName}/token
            Method: POST
        SetupPerson:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: QuestradeApi
            Path: /api/auth/setup-person
            Method: POST
        RefreshToken:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: QuestradeApi
            Path: /api/auth/refresh-token/{personName}
            Method: POST
        GetTokenStatus:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: QuestradeApi
            Path: /api/auth/token-status/{personName}
            Method: GET
        GetAccessToken:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: QuestradeApi
            Path: /api/auth/access-token/{personName}
            Method: GET
        TestConnection:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: QuestradeApi
            Path: /api/auth/test-connection/{personName}
            Method: POST
        GetTokens:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: QuestradeApi
            Path: /api/tokens
            Method: GET
        GetPersonTokens:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: QuestradeApi
            Path: /api/tokens/{personName}
            Method: GET
        DeleteExpiredTokens:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: QuestradeApi
            Path: /api/tokens/expired
            Method: DELETE
        GetTokenStats:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: QuestradeApi
            Path: /api/tokens/stats/summary
            Method: GET
        AuthHealth:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: QuestradeApi
            Path: /api/auth/health
            Method: GET
    Metadata:
      SamResourceId: AuthServiceFunction
  SyncOperationsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName:
        Fn::Sub: questrade-sync-operations-${Environment}
      CodeUri: lambda-functions/sync-operations/
      Handler: src/handler.handler
      MemorySize: 1024
      Timeout: 60
      ReservedConcurrentExecutions: 5
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: PersonsTable
      - DynamoDBCrudPolicy:
          TableName:
            Ref: TokensTable
      - DynamoDBCrudPolicy:
          TableName:
            Ref: AccountsTable
      - DynamoDBCrudPolicy:
          TableName:
            Ref: PositionsTable
      - DynamoDBCrudPolicy:
          TableName:
            Ref: ActivitiesTable
      - DynamoDBCrudPolicy:
          TableName:
            Ref: SymbolsTable
      - DynamoDBCrudPolicy:
          TableName:
            Ref: SyncHistoryTable
      - DynamoDBCrudPolicy:
          TableName:
            Ref: CacheTable
      Events:
        SyncPerson:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: QuestradeApi
            Path: /api/sync/person/{personName}
            Method: POST
        SyncAccounts:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: QuestradeApi
            Path: /api/sync/accounts/{personName}
            Method: POST
        SyncPositions:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: QuestradeApi
            Path: /api/sync/positions/{personName}
            Method: POST
        SyncActivities:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: QuestradeApi
            Path: /api/sync/activities/{personName}
            Method: POST
        SyncAccount:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: QuestradeApi
            Path: /api/sync/account/{personName}/{accountNumber}
            Method: POST
        SyncAll:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: QuestradeApi
            Path: /api/sync/all
            Method: POST
        SyncStatus:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: QuestradeApi
            Path: /api/sync/status
            Method: GET
        SyncHistory:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: QuestradeApi
            Path: /api/sync/history
            Method: GET
        SyncHealth:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: QuestradeApi
            Path: /api/sync/health
            Method: GET
        SyncCandlesPerson:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: QuestradeApi
            Path: /api/sync/candles/person/{personName}
            Method: POST
        SyncCandlesAll:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: QuestradeApi
            Path: /api/sync/candles/all
            Method: POST
        SyncTrigger:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: QuestradeApi
            Path: /api/sync/trigger
            Method: POST
        DailySync:
          Type: Schedule
          Properties:
            Schedule: cron(0 11 ? * MON-FRI *)
            Description: Daily sync Mon-Fri at 6:00 AM EST (11:00 AM UTC) - fetches previous day close
            Enabled: true
            Input: '{"action": "daily-sync"}'
        PrevDayCloseSync:
          Type: Schedule
          Properties:
            Schedule: cron(30 21 ? * MON-FRI *)
            Description: Master candle sync Mon-Fri at 4:30 PM EST (9:30 PM UTC) - updates previousClose for all symbols
            Enabled: true
            Input: '{"action": "master-candles"}'
    Metadata:
      SamResourceId: SyncOperationsFunction
  DailySyncFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName:
        Fn::Sub: questrade-daily-sync-${Environment}
      CodeUri: lambda-functions/daily-sync/
      Handler: src/handler.handler
      MemorySize: 512
      Timeout: 30
      Environment:
        Variables:
          SYMBOLS_MASTER_TABLE:
            Ref: SymbolsMasterTable
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: PersonsTable
      - DynamoDBCrudPolicy:
          TableName:
            Ref: TokensTable
      - DynamoDBCrudPolicy:
          TableName:
            Ref: AccountsTable
      - DynamoDBCrudPolicy:
          TableName:
            Ref: PositionsTable
      - DynamoDBCrudPolicy:
          TableName:
            Ref: CacheTable
      - DynamoDBCrudPolicy:
          TableName:
            Ref: SymbolsMasterTable
      Events:
        DailySyncSchedule:
          Type: Schedule
          Properties:
            Schedule: cron(0 22 ? * MON-FRI *)
            Description: Daily lightweight sync Mon-Fri at 6:00 PM ET
            Enabled: true
        DailySyncManual:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: QuestradeApi
            Path: /api/sync/daily-sync-all
            Method: POST
    Metadata:
      SamResourceId: DailySyncFunction
  DataReadServiceFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName:
        Fn::Sub: questrade-data-read-service-${Environment}
      CodeUri: lambda-functions/data-read-service/
      Handler: src/handler.handler
      MemorySize: 512
      Timeout: 10
      Policies:
