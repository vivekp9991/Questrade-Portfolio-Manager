        ScheduledRefresh:
          Type: Schedule
          Properties:
            Schedule: rate(4 minutes)
            Description: Automatically refresh Questrade tokens every 4 minutes - checks access tokens (5 min expiry) and refresh tokens (renews when < 1 day remaining)
            Enabled: true
    Metadata:
      SamResourceId: TokenRefreshSchedulerFunction
  DailySyncSchedulerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName:
        Fn::Sub: questrade-daily-sync-scheduler-${Environment}
      CodeUri: lambda-functions/daily-sync-scheduler/
      Handler: src/handler.handler
      MemorySize: 512
      Timeout: 300
      Environment:
        Variables:
          SYNC_API_URL:
            Fn::Sub: https://${QuestradeApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/api
      Policies:
      - Statement:
        - Effect: Allow
          Action:
          - execute-api:Invoke
          Resource:
            Fn::Sub: arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${QuestradeApi}/*
      Events:
        DailySync:
          Type: Schedule
          Properties:
            Schedule: cron(0 11 ? * MON-FRI *)
            Description: Daily sync Mon-Fri at 6:00 AM EST (11:00 AM UTC) - fetches previous day close
            Enabled: true
    Metadata:
      SamResourceId: DailySyncSchedulerFunction

  MonthlyDividendSyncFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName:
        Fn::Sub: questrade-monthly-dividend-sync-${Environment}
      CodeUri: lambda-functions/monthly-dividend-sync/
      Handler: src/handler.handler
      MemorySize: 512
      Timeout: 600
      Environment:
        Variables:
          SYNC_FUNCTION_NAME:
            Fn::Sub: questrade-sync-operations-${Environment}
      Policies:
      - Statement:
        - Effect: Allow
          Action:
          - lambda:InvokeFunction
          Resource:
            Fn::Sub: arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:questrade-sync-operations-${Environment}
      Events:
        MonthlyDividendSync:
          Type: Schedule
          Properties:
            Schedule: cron(0 13 1 * ? *)
            Description: Monthly dividend sync on 1st of month at 8:00 AM EST (1:00 PM UTC)
            Enabled: true
    Metadata:
      SamResourceId: MonthlyDividendSyncFunction
