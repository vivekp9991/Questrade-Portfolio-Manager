          TableName:
            Ref: AccountsTable
      - DynamoDBReadPolicy:
          TableName:
            Ref: PositionsTable
      - DynamoDBReadPolicy:
          TableName:
            Ref: ActivitiesTable
      - DynamoDBReadPolicy:
          TableName:
            Ref: PersonsTable
      - DynamoDBReadPolicy:
          TableName:
            Ref: SyncHistoryTable
