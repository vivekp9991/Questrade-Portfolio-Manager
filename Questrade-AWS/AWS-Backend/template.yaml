  # Phase 2b: portfolio sync orchestration. Maps over eligible logins, syncing each
  # in isolation with retry/backoff. Replaces the retired DailySync/daily-sync crons.
  PortfolioSyncStateMachine:
    Type: AWS::Serverless::StateMachine
    Properties:
      Name:
        Fn::Sub: questrade-portfolio-sync-${Environment}
      Type: STANDARD
      DefinitionSubstitutions:
        SyncFunctionArn:
          Fn::GetAtt: [SyncOperationsFunction, Arn]
      Policies:
      - LambdaInvokePolicy:
          FunctionName:
            Ref: SyncOperationsFunction
      Events:
        DailyAfterClose:
          Type: Schedule
          Properties:
            Schedule: cron(0 22 ? * MON-FRI *)
            Description: Daily portfolio sync Mon-Fri ~6pm ET (after market close) for all eligible logins
            Enabled: true
      Definition:
        Comment: Daily Questrade portfolio sync - per-login isolation with retry/backoff
        StartAt: GetEligiblePersons
        States:
          GetEligiblePersons:
            Type: Task
            Resource: arn:aws:states:::lambda:invoke
            Parameters:
              FunctionName: ${SyncFunctionArn}
              Payload:
                task: getEligiblePersons
            ResultSelector:
              persons.$: $.Payload.persons
            ResultPath: $.eligible
            Next: SyncPersons
          SyncPersons:
            Type: Map
            ItemsPath: $.eligible.persons
            MaxConcurrency: 1
            Parameters:
              personName.$: $$.Map.Item.Value
            Iterator:
              StartAt: SyncOnePerson
              States:
                SyncOnePerson:
                  Type: Task
                  Resource: arn:aws:states:::lambda:invoke
                  Parameters:
                    FunctionName: ${SyncFunctionArn}
                    Payload:
                      task: syncPerson
                      personName.$: $.personName
                  Retry:
                  - ErrorEquals:
                    - States.TaskFailed
                    - Lambda.ServiceException
                    - Lambda.TooManyRequestsException
                    - Lambda.AWSLambdaException
                    - States.Timeout
                    IntervalSeconds: 10
                    BackoffRate: 2.0
                    MaxAttempts: 3
                  Catch:
                  - ErrorEquals:
                    - States.ALL
                    ResultPath: $.error
                    Next: PersonFailed
                  End: true
                PersonFailed:
                  Type: Pass
                  End: true
            End: true
Outputs:
  PortfolioSyncStateMachineArn:
    Description: ARN of the daily portfolio sync state machine (use for manual StartExecution)
    Value:
      Ref: PortfolioSyncStateMachine
  ApiEndpoint:
