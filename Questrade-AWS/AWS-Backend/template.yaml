      Policies:
      - Statement:
        - Effect: Allow
          Action:
          - execute-api:Invoke
          Resource:
            Fn::Sub: arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${QuestradeApi}/*
      Events:
        DailySync:
          Type: Schedule
          Properties:
            Schedule: cron(0 11 ? * MON-FRI *)
            Description: Daily sync Mon-Fri at 6:00 AM EST (11:00 AM UTC) - fetches previous day close
            Enabled: true
    Metadata:
      SamResourceId: DailySyncSchedulerFunction

