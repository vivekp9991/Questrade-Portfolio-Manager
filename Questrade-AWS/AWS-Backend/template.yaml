  TokenRefreshSchedulerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName:
        Fn::Sub: questrade-token-refresh-scheduler-${Environment}
      CodeUri: lambda-functions/token-refresh-scheduler/
      Handler: src/handler.handler
      MemorySize: 512
      Timeout: 300
      Environment:
        Variables:
          PERSONS_TABLE:
            Ref: PersonsTable
          TOKENS_TABLE:
            Ref: TokensTable
          CACHE_TABLE:
            Ref: CacheTable
          ENCRYPTION_KEY:
            Ref: EncryptionKey
          QUESTRADE_AUTH_URL: https://login.questrade.com
          TWELVE_DATA_API_KEY:
            Ref: TwelveDataApiKey
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: PersonsTable
      - DynamoDBCrudPolicy:
          TableName:
            Ref: TokensTable
      - DynamoDBCrudPolicy:
          TableName:
            Ref: CacheTable
      Events:
        ScheduledRefresh:
          Type: Schedule
          Properties:
            Schedule: rate(12 hours)
            Description: Keepalive — rotates each login's single-use refresh token only when stale (>2 days old or expiring within 36h), keeping it inside Questrade's 3-day window. Access tokens (30 min) are refreshed on-demand by sync/API. Serialized via DynamoDB lock in the shared token service.
            Enabled: true
    Metadata:
      SamResourceId: TokenRefreshSchedulerFunction
  DailySyncSchedulerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName:
        Fn::Sub: questrade-daily-sync-scheduler-${Environment}
